<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플 수익/소비 기록부</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; line-height: 1.6; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* 대시보드 */
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 13px; color: #666; }
        .stat-card .amount { font-size: 18px; font-weight: bold; margin-top: 8px; }
        .income-text { color: #2ecc71; } /* 수익 초록색 */
        .expense-text { color: #e74c3c; } /* 소비 빨간색 */

        /* 입력 폼 */
        .input-group { display: flex; gap: 8px; margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; flex-wrap: wrap; }
        select, input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        #typeSelect { width: 80px; font-weight: bold; }
        #charName { width: 120px; }
        #content { flex: 2; min-width: 150px; }
        #amount { flex: 1; min-width: 120px; }
        button.save-btn { padding: 12px 25px; background-color: #f39c12; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button.save-btn:hover { background-color: #e67e22; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #888; font-size: 13px; }
        .delete-btn { padding: 5px 10px; background-color: #ff4757; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        /* 요약 섹션 */
        .summary-section { margin-top: 50px; padding-top: 20px; border-top: 1px dashed #ddd; }
        .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🍁 메이플 통합 가계부</h2>
        
        <div class="dashboard">
            <div class="stat-card">
                <h3>오늘의 수익 / 소비</h3>
                <div id="todayIncome" class="amount income-text">0 메소</div>
                <div id="todayExpense" class="amount expense-text">0 메소</div>
            </div>
            <div class="stat-card">
                <h3>이번 주 누적 수익 / 소비</h3>
                <div id="weekIncome" class="amount income-text">0 메소</div>
                <div id="weekExpense" class="amount expense-text">0 메소</div>
            </div>
        </div>

        <div class="input-group">
            <select id="typeSelect">
                <option value="수익">수익</option>
                <option value="소비">소비</option>
            </select>
            <input type="text" id="charName" placeholder="캐릭터명">
            <input type="text" id="content" placeholder="항목 (재획, 보스, 템구매 등)">
            <input type="text" id="amount" placeholder="메소 금액" oninput="inputNumberFormat(this)">
            <button class="save-btn" onclick="saveLog()">기록하기</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>날짜</th>
                    <th>구분</th>
                    <th>캐릭터</th>
                    <th>항목</th>
                    <th>금액 (메소)</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>

        <div class="summary-section">
            <div class="summary-header">
                <h3>📊 월별 캐릭터 수익 비중</h3>
                <select id="monthFilter" onchange="loadLogs()">
                    <option value="all">전체 보기</option>
                    <option value="4" selected>4월 통계</option>
                    </select>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>캐릭터명</th>
                        <th>당월 총 수익</th>
                        <th>수익 비중</th>
                    </tr>
                </thead>
                <tbody id="charSummaryTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fbmnyvsnawcjlvxdbctw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LtCFQXm4FzsCX6tCIQDg2g_5YLxuf2j';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function inputNumberFormat(obj) {
            let value = obj.value.replace(/[^\d]/g, "");
            obj.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        async function saveLog() {
            const type = document.getElementById('typeSelect').value;
            const charName = document.getElementById('charName').value;
            const content = document.getElementById('content').value;
            const rawAmount = document.getElementById('amount').value.replace(/,/g, "");
            let amount = parseInt(rawAmount);

            if(!charName || isNaN(amount)) return alert("정보를 정확히 입력해주세요!");
            
            // 소비일 경우 금액을 마이너스로 저장하여 계산을 편하게 함
            if(type === "소비") amount = -Math.abs(amount);

            const { error } = await _supabase
                .from('income_logs')
                .insert([{ character_name: charName, content: content, amount: amount }]);

            if (error) alert('저장 실패: ' + error.message);
            else {
                document.getElementById('content').value = '';
                document.getElementById('amount').value = '';
                loadLogs();
            }
        }

        async function deleteLog(id) {
            if(!confirm("삭제하시겠습니까?")) return;
            await _supabase.from('income_logs').delete().eq('id', id);
            loadLogs();
        }

        async function loadLogs() {
            const { data, error } = await _supabase.from('income_logs').select('*').order('created_at', { ascending: false });
            if (error) return;

            const now = new Date();
            const todayStr = now.toLocaleDateString();
            
            // 주간 계산용 (월요일 기준)
            const tempDate = new Date();
            const day = tempDate.getDay();
            const diff = tempDate.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(tempDate.setDate(diff)).setHours(0,0,0,0);

            let tIn = 0, tEx = 0, wIn = 0, wEx = 0;
            const tbody = document.getElementById('logTable');
            tbody.innerHTML = '';
            
            const charSummary = {};
            let monthTotalIncome = 0;

            data.forEach(log => {
                const logDate = new Date(log.created_at);
                const amt = Number(log.amount);
                const isIncome = amt > 0;

                // 대시보드 통계 계산
                if (logDate.toLocaleDateString() === todayStr) {
                    if(isIncome) tIn += amt; else tEx += Math.abs(amt);
                }
                if (logDate >= monday) {
                    if(isIncome) wIn += amt; else wEx += Math.abs(amt);
                }

                // 테이블 출력
                const row = `<tr>
                    <td>${logDate.toLocaleDateString()}</td>
                    <td class="${isIncome ? 'income-text' : 'expense-text'}">${isIncome ? '수익' : '소비'}</td>
                    <td>${log.character_name}</td>
                    <td>${log.content}</td>
                    <td class="${isIncome ? 'income-text' : 'expense-text'}">${Math.abs(amt).toLocaleString()}</td>
                    <td><button class="delete-btn" onclick="deleteLog(${log.id})">삭제</button></td>
                </tr>`;
                tbody.innerHTML += row;

                // 캐릭터별 수익 비중 (소비는 제외하고 수익만 계산)
                if(isIncome && logDate.getMonth() === now.getMonth()) {
                    charSummary[log.character_name] = (charSummary[log.character_name] || 0) + amt;
                    monthTotalIncome += amt;
                }
            });

            document.getElementById('todayIncome').innerText = "+ " + tIn.toLocaleString() + " 메소";
            document.getElementById('todayExpense').innerText = "- " + tEx.toLocaleString() + " 메소";
            document.getElementById('weekIncome').innerText = "+ " + wIn.toLocaleString() + " 메소";
            document.getElementById('weekExpense').innerText = "- " + wEx.toLocaleString() + " 메소";

            // 하단 정산표 업데이트
            const charTbody = document.getElementById('charSummaryTable');
            charTbody.innerHTML = '';
            Object.entries(charSummary).sort((a,b) => b[1]-a[1]).forEach(([name, total]) => {
                const percent = ((total / monthTotalIncome) * 100).toFixed(1);
                charTbody.innerHTML += `<tr><td>${name}</td><td>${total.toLocaleString()}</td><td>${percent}%</td></tr>`;
            });
        }

        loadLogs();
    </script>
</body>
</html>
